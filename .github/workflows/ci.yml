name: CI Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-linux:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            build-essential \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-xinerama0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-xkb1 \
            libegl1-mesa-dev \
            xvfb

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.3'
          host: 'linux'
          target: 'desktop'
          modules: 'qt5compat qtshadertools'
          cache: true

      - name: Configure CMake
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run Tests
        run: |
          xvfb-run ctest --test-dir build/tests --output-on-failure

      - name: Self-Check
        run: |
          # Set QML_IMPORT_PATH to the output directory so the app finds Kaakao plugin
          export QML_IMPORT_PATH=$GITHUB_WORKSPACE/build/qml
          xvfb-run ./build/src/ninjaview --selftest

  build-macos:
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install System Dependencies
        run: |
          brew install ninja

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.3'
          host: 'mac'
          target: 'desktop'
          modules: 'qt5compat qtshadertools'
          cache: true

      - name: Configure CMake
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Run Tests
        run: |
          ctest --test-dir build/tests --output-on-failure

      - name: Self-Check
        run: |
          export QML_IMPORT_PATH=$GITHUB_WORKSPACE/build/qml
          ./build/src/NinjaView.app/Contents/MacOS/NinjaView --selftest

  release-macos:
    runs-on: macos-14
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install System Dependencies
        run: |
          brew install ninja

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.3'
          host: 'mac'
          target: 'desktop'
          modules: 'qt5compat qtshadertools'
          cache: true

      - name: Configure CMake
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          BUILD_ID=$(git rev-parse --short HEAD)
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/install_dir \
            -DNINJAVIEW_VERSION="$VERSION" \
            -DNINJAVIEW_BUILD_ID="$BUILD_ID"

      - name: Build
        run: cmake --build build

      - name: Install & Package standalone .app
        run: |
          cmake --install build

      - name: Archive .app bundle
        run: |
          cd $GITHUB_WORKSPACE/install_dir
          zip -r ../NinjaView.app.zip NinjaView.app

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: NinjaView.app.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-linux:
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build and Package DEB (Ubuntu 26.04)
        run: |
          docker run --rm -v $PWD:/workspace -w /workspace ubuntu:26.04 bash -c "
            apt-get update && apt-get install -y cmake ninja-build build-essential qt6-base-dev qt6-declarative-dev qt6-5compat-dev qt6-shadertools-dev libgl1-mesa-dev libxkbcommon-dev git dpkg-dev &&
            cmake -S . -B build-deb -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr -DNINJAVIEW_VERSION=${GITHUB_REF_NAME#v} -DNINJAVIEW_BUILD_ID=\$(git rev-parse --short HEAD) &&
            cmake --build build-deb &&
            cpack --config build-deb/CPackConfig.cmake -G DEB &&
            chown \$(stat -c \"%u:%g\" .) *.deb || true
          "

      - name: Build and Package RPM (Fedora 42)
        run: |
          docker run --rm -v $PWD:/workspace -w /workspace fedora:42 bash -c "
            dnf install -y cmake ninja-build gcc-c++ qt6-qtbase-devel qt6-qtdeclarative-devel qt6-qt5compat-devel qt6-qtshadertools-devel mesa-libGL-devel libxkbcommon-devel git rpm-build &&
            cmake -S . -B build-rpm -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr -DNINJAVIEW_VERSION=${GITHUB_REF_NAME#v} -DNINJAVIEW_BUILD_ID=\$(git rev-parse --short HEAD) &&
            cmake --build build-rpm &&
            cpack --config build-rpm/CPackConfig.cmake -G RPM &&
            chown \$(stat -c \"%u:%g\" .) *.rpm || true
          "

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.deb
            *.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
